<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Lab Clone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            appbg: '#0F111A',
            headerbg: '#161A23',
            btnbg: '#1F2333',
            btnhover: '#2A3043',
            bordercol: '#282D3F',
            vphead: '#2B3041',
            vpbg: '#12141F',
            brand: '#4F46E5',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #0F111A; }
    ::-webkit-scrollbar-thumb { background: #282D3F; border-radius: 5px; border: 2px solid #0F111A; }
    input[type=range] { accent-color: #4F46E5; }
    
    .frame-wrapper-se { width: 281.25px; height: 500.25px; }
    .frame-inner-se { width: 375px; height: 667px; transform: scale(0.75); transform-origin: top left; }
    
    .frame-wrapper-14 { width: 292.5px; height: 633px; }
    .frame-inner-14 { width: 390px; height: 844px; transform: scale(0.75); transform-origin: top left; }
    
    .frame-wrapper-ipad { width: 615px; height: 885px; }
    .frame-inner-ipad { width: 820px; height: 1180px; transform: scale(0.75); transform-origin: top left; }
    
    .frame-wrapper-pro { width: 1080px; height: 675px; }
    .frame-inner-pro { width: 1440px; height: 900px; transform: scale(0.75); transform-origin: top left; }
  </style>
</head>
<body class="bg-appbg text-slate-300 h-screen flex flex-col overflow-hidden antialiased">
  
  <!-- Header ToolBar -->
  <header class="h-[52px] bg-headerbg flex items-center justify-between px-4 border-b border-bordercol shrink-0 flex-nowrap min-w-max">
    <div class="flex items-center gap-6 flex-1">
      
      <!-- Logo -->
      <div class="flex items-center gap-2.5">
        <img height="24" width="24" src="https://placehold.co/24x24?text=Responsive%20Lab%20Logo" alt="Responsive Lab Logo" class="rounded shadow-sm" />
        <span class="font-semibold text-white tracking-wide text-[15px]">Responsive Lab</span>
      </div>

      <!-- URL Input -->
      <div class="flex items-center w-[360px]">
        <input type="text" value="https://example.com" class="flex-1 bg-[#0F111A] border border-bordercol border-r-0 rounded-l px-3 py-1.5 text-[13px] text-slate-300 focus:outline-none focus:border-brand h-[34px] transition-colors" />
        <button class="bg-brand hover:bg-indigo-500 text-white px-4 py-1.5 rounded-r text-[13px] font-medium h-[34px] border border-brand transition-colors">Go</button>
      </div>

    </div>

    <!-- Right Controls -->
    <div class="flex items-center gap-2 shrink-0">
      <button class="flex items-center gap-1.5 px-3 h-[32px] rounded border border-bordercol bg-btnbg hover:bg-btnhover text-[13px] transition-colors">
        <img height="12" width="12" src="https://placehold.co/16x16?text=Add" alt="Add" class="w-3 h-3" />
        <span class="text-white font-medium">Add</span>
      </button>
      
      <button class="px-3 h-[32px] rounded border border-bordercol bg-btnbg hover:bg-btnhover text-[13px] transition-colors">
        Reset
      </button>

      <label class="flex items-center gap-2 px-3 h-[32px] rounded border border-bordercol bg-btnbg hover:bg-btnhover text-[13px] cursor-pointer transition-colors">
        <input type="checkbox" checked class="w-[14px] h-[14px] rounded-sm bg-appbg border-bordercol text-brand accent-white cursor-pointer" />
        Sync Scroll
      </label>

      <button class="flex items-center gap-1.5 px-3 h-[32px] rounded border border-bordercol bg-btnbg hover:bg-btnhover text-[13px] transition-colors">
        <img height="14" width="14" src="https://placehold.co/16x16?text=Rotate" alt="Rotate" class="w-3.5 h-3.5 opacity-80" />
        Rotate
      </button>

      <!-- Zoom Controller -->
      <div class="flex items-center gap-3 px-2 h-[32px] min-w-[120px]">
        <span class="text-[13px] text-slate-400 font-medium w-8 text-right">75%</span>
        <input type="range" class="w-16 cursor-pointer" min="10" max="200" value="75" />
      </div>

      <button class="flex items-center gap-1.5 px-3 h-[32px] rounded border border-bordercol bg-btnbg hover:bg-btnhover text-[13px] transition-colors">
        <img height="14" width="14" src="https://placehold.co/16x16?text=Reload" alt="Reload" class="w-3.5 h-3.5 opacity-80" />
        Reload
      </button>

      <button class="flex items-center gap-1.5 px-3 h-[32px] rounded border border-bordercol bg-btnbg hover:bg-btnhover text-[13px] transition-colors">
        <img height="14" width="14" src="https://placehold.co/16x16?text=Settings" alt="Settings" class="w-3.5 h-3.5 opacity-80" />
        Settings
      </button>

      <button class="flex items-center gap-1.5 px-3 h-[32px] rounded border border-bordercol bg-btnbg hover:bg-btnhover text-[13px] transition-colors">
        <img height="14" width="14" src="https://placehold.co/16x16?text=GitHub" alt="GitHub" class="w-3.5 h-3.5 rounded-full opacity-90" />
        GitHub
      </button>
    </div>
  </header>

  <!-- Main Frames Layout Container -->
  <main class="flex-1 w-full overflow-x-auto p-6 select-none bg-appbg relative">
    <div class="flex items-start gap-6 h-full w-max">

      <!-- iPhone SE -->
      <div class="frame-wrapper-se shrink-0">
        <div class="frame-inner-se flex flex-col rounded-md shadow-2xl bg-vpbg border border-bordercol">
          <div class="h-10 px-3 flex items-center justify-between bg-vphead rounded-t-md shrink-0 border-b border-bordercol">
            <div class="flex items-center gap-3">
              <img height="12" width="8" src="https://placehold.co/16x16?text=Drag%20Handle" alt="Drag Handle" class="w-2 h-3 opacity-70 cursor-move" />
              <div class="flex items-center gap-3">
                <span class="font-semibold text-[13px] text-white tracking-wide">iPhone SE</span>
                <span class="text-[11px] font-medium text-slate-400">375 × 667</span>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <img height="12" width="12" src="https://placehold.co/16x16?text=Rotate" alt="Rotate" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
              <img height="12" width="12" src="https://placehold.co/16x16?text=Reload" alt="Reload" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
              <img height="12" width="12" src="https://placehold.co/16x16?text=Close" alt="Close" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
            </div>
          </div>
          <div class="flex-1 flex flex-col items-center justify-center rounded-b-md relative">
            <div class="flex flex-col items-center gap-2">
              <img height="24" width="24" src="https://placehold.co/24x24?text=Up%20Arrow" alt="Up Arrow" class="w-6 h-6 mb-1 opacity-60" />
              <span class="text-[14px] text-slate-500 font-medium tracking-wide">Enter a URL above to preview</span>
            </div>
          </div>
        </div>
      </div>

      <!-- iPhone 14 -->
      <div class="frame-wrapper-14 shrink-0">
        <div class="frame-inner-14 flex flex-col rounded-md shadow-2xl bg-vpbg border border-bordercol">
          <div class="h-10 px-3 flex items-center justify-between bg-vphead rounded-t-md shrink-0 border-b border-bordercol">
            <div class="flex items-center gap-3">
              <img height="12" width="8" src="https://placehold.co/16x16?text=Drag%20Handle" alt="Drag Handle" class="w-2 h-3 opacity-70 cursor-move" />
              <div class="flex items-center gap-3">
                <span class="font-semibold text-[13px] text-white tracking-wide">iPhone 14</span>
                <span class="text-[11px] font-medium text-slate-400">390 × 844</span>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <img height="12" width="12" src="https://placehold.co/16x16?text=Rotate" alt="Rotate" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
              <img height="12" width="12" src="https://placehold.co/16x16?text=Reload" alt="Reload" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
              <img height="12" width="12" src="https://placehold.co/16x16?text=Close" alt="Close" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
            </div>
          </div>
          <div class="flex-1 flex flex-col items-center justify-center rounded-b-md relative">
            <div class="flex flex-col items-center gap-2">
              <img height="24" width="24" src="https://placehold.co/24x24?text=Up%20Arrow" alt="Up Arrow" class="w-6 h-6 mb-1 opacity-60" />
              <span class="text-[14px] text-slate-500 font-medium tracking-wide">Enter a URL above to preview</span>
            </div>
          </div>
        </div>
      </div>

      <!-- iPad Air -->
      <div class="frame-wrapper-ipad shrink-0">
        <div class="frame-inner-ipad flex flex-col rounded-md shadow-2xl bg-vpbg border border-bordercol">
          <div class="h-10 px-3 flex items-center justify-between bg-vphead rounded-t-md shrink-0 border-b border-bordercol">
            <div class="flex items-center gap-3">
              <img height="12" width="8" src="https://placehold.co/16x16?text=Drag%20Handle" alt="Drag Handle" class="w-2 h-3 opacity-70 cursor-move" />
              <div class="flex items-center gap-3">
                <span class="font-semibold text-[13px] text-white tracking-wide">iPad Air</span>
                <span class="text-[11px] font-medium text-slate-400">820 × 1180</span>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <img height="12" width="12" src="https://placehold.co/16x16?text=Rotate" alt="Rotate" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
              <img height="12" width="12" src="https://placehold.co/16x16?text=Reload" alt="Reload" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
              <img height="12" width="12" src="https://placehold.co/16x16?text=Close" alt="Close" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
            </div>
          </div>
          <div class="flex-1 flex flex-col items-center justify-center rounded-b-md relative">
            <div class="flex flex-col items-center gap-2">
              <img height="24" width="24" src="https://placehold.co/24x24?text=Up%20Arrow" alt="Up Arrow" class="w-6 h-6 mb-1 opacity-60" />
              <span class="text-[14px] text-slate-500 font-medium tracking-wide">Enter a URL above to preview</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Macbook Pro / Blank Outer Frame -->
      <div class="frame-wrapper-pro shrink-0">
        <div class="frame-inner-pro flex flex-col rounded-md shadow-2xl bg-vpbg border border-bordercol">
          <div class="h-10 px-3 flex items-center justify-between bg-vphead rounded-t-md shrink-0 border-b border-bordercol">
            <div class="flex items-center gap-3">
              <img height="12" width="8" src="https://placehold.co/16x16?text=Drag%20Handle" alt="Drag Handle" class="w-2 h-3 opacity-70 cursor-move" />
              <div class="flex items-center gap-3">
                <span class="font-semibold text-[13px] text-white tracking-wide">MacBook Pro</span>
                <span class="text-[11px] font-medium text-slate-400">1440 × 900</span>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <img height="12" width="12" src="https://placehold.co/16x16?text=Rotate" alt="Rotate" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
              <img height="12" width="12" src="https://placehold.co/16x16?text=Reload" alt="Reload" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
              <img height="12" width="12" src="https://placehold.co/16x16?text=Close" alt="Close" class="w-3 h-3 opacity-60 hover:opacity-100 cursor-pointer" />
            </div>
          </div>
          <div class="flex-1 flex flex-col items-center justify-center rounded-b-md relative">
            <div class="flex flex-col items-center gap-2">
              <img height="24" width="24" src="https://placehold.co/24x24?text=Up%20Arrow" alt="Up Arrow" class="w-6 h-6 mb-1 opacity-60" />
              <span class="text-[14px] text-slate-500 font-medium tracking-wide">Enter a URL above to preview</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
  
</body>
</html>
